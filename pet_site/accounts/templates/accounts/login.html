{% extends "base.html" %}

{% block title %}登录 - 宠物之家{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="text-center mb-4">用户登录</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100 mt-3">登录</button>
    </form>
    <div class="text-center mt-3">
        <p>还没有账号？<a href="{% url 'accounts:register' %}">立即注册</a></p>
    </div>
</div>
{% endblock %}
